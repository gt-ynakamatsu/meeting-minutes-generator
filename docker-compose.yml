services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: mm-api
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - WEBHOOK_URL=${WEBHOOK_URL:-YOUR_WEBHOOK_URL_HERE}
      - CORS_ORIGINS=${MM_CORS_ORIGINS:-http://localhost:8085,http://127.0.0.1:8085,http://localhost:5173}
    volumes:
      - ./data:/app/data
      - ./downloads:/app/downloads
    expose:
      - "8000"
    depends_on:
      - redis

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: mm-frontend
    ports:
      - "${MM_FRONTEND_PORT:-8085}:80"
    depends_on:
      - api

  worker:
    build: .
    container_name: whisper-worker
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - WEBHOOK_URL=${WEBHOOK_URL:-YOUR_WEBHOOK_URL_HERE}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama-server:11434}
    networks:
      - default
      - llm-net
    volumes:
      - ./data:/app/data
      - ./downloads:/app/downloads
      - ./:/app
    command: celery -A tasks worker --loglevel=info --concurrency=1
    depends_on:
      - redis

  redis:
    image: redis:alpine

networks:
  llm-net:
    external: true
