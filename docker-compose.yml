# worker と同一 Dockerfile のサービスを2つ書くと、ビルドコンテキストが二重に送られる。
# 同じイメージなら worker だけ build + image を付け、もう一方は image のみにするとよい。
#
# ビルドログで #7 [worker] / #8 [api] が交互に出るのは「並列ビルド」でありループではない。
# 転送が数百 MB のままなら、サーバのプロジェクト直下に .dockerignore が無い／古い可能性が高い。
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: mm-api
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - WEBHOOK_URL=${WEBHOOK_URL:-YOUR_WEBHOOK_URL_HERE}
      - CORS_ORIGINS=${MM_CORS_ORIGINS:-http://localhost:8085,http://127.0.0.1:8085,http://localhost:5173}
      # 未指定時はフォールバックで認証 ON（ユーザー別 data/user_data/<slug>/minutes.db）。本番は MM_AUTH_SECRET を openssl rand -hex 32 等で必ず差し替え。
      - MM_AUTH_SECRET=${MM_AUTH_SECRET:-meet-minutes-default-jwt-hs256-key-change-in-production-use-openssl-rand-hex-32}
      # 初回のみ有効。ログイン ID 用のメールアドレス。
      - MM_BOOTSTRAP_ADMIN_USER=${MM_BOOTSTRAP_ADMIN_USER:-}
      - MM_BOOTSTRAP_ADMIN_PASSWORD=${MM_BOOTSTRAP_ADMIN_PASSWORD:-}
      - MM_AUTH_TOKEN_HOURS=${MM_AUTH_TOKEN_HOURS:-168}
      - MM_AUTH_SELF_REGISTER=${MM_AUTH_SELF_REGISTER:-1}
      # 議事録の自動削除（日）。0 で無効。未指定時は 30（約1か月）。
      - MM_MINUTES_RETENTION_DAYS=${MM_MINUTES_RETENTION_DAYS:-30}
      # OpenAI / ChatGPT（課金回避で既定オフ。有効にする: MM_OPENAI_ENABLED=1）
      - MM_OPENAI_ENABLED=${MM_OPENAI_ENABLED:-0}
      # モデル一覧 API 用（worker と同じ Ollama ホストを指定）。api を llm-net に参加させること。
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama-server:11434}
      # メール完了通知（任意）。MM_EMAIL_NOTIFY_ENABLED=1 かつ SMTP 設定時のみ UI・送信あり（未設定時はオフ）。
      # - MM_EMAIL_NOTIFY_ENABLED=1
      # - MM_SMTP_HOST=${MM_SMTP_HOST:-}
      # - MM_SMTP_PORT=${MM_SMTP_PORT:-587}
      # - MM_SMTP_FROM=${MM_SMTP_FROM:-}
      # - MM_SMTP_USER=${MM_SMTP_USER:-}
      # - MM_SMTP_PASSWORD=${MM_SMTP_PASSWORD:-}
    volumes:
      - ./data:/app/data
      - ./downloads:/app/downloads
    expose:
      - "8000"
    depends_on:
      - redis
    networks:
      - default
      - llm-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_ALT_APP_HOSTNAME: ${VITE_ALT_APP_HOSTNAME:-}
        VITE_BASE_PATH: ${VITE_BASE_PATH:-/}
        VITE_API_BASE: ${VITE_API_BASE:-}
    container_name: mm-frontend
    ports:
      - "${MM_FRONTEND_PORT:-8085}:80"
    depends_on:
      - api

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whisper-worker
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - WEBHOOK_URL=${WEBHOOK_URL:-YOUR_WEBHOOK_URL_HERE}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama-server:11434}
      - MM_MINUTES_RETENTION_DAYS=${MM_MINUTES_RETENTION_DAYS:-30}
      # VRAM 不足 (CUDA OOM) 時: WHISPER_MODEL=small / WHISPER_COMPUTE_TYPE=int8_float16 など（.env で指定）
      - WHISPER_MODEL=${WHISPER_MODEL:-medium}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cuda}
      - WHISPER_COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE:-float16}
      - MM_OPENAI_ENABLED=${MM_OPENAI_ENABLED:-0}
      # メール通知: MM_EMAIL_NOTIFY_ENABLED=1 と SMTP を api と同様に渡す
      # - MM_EMAIL_NOTIFY_ENABLED=1
      # - MM_SMTP_HOST=${MM_SMTP_HOST:-}
      # - MM_SMTP_PORT=${MM_SMTP_PORT:-587}
      # - MM_SMTP_FROM=${MM_SMTP_FROM:-}
      # - MM_SMTP_USER=${MM_SMTP_USER:-}
      # - MM_SMTP_PASSWORD=${MM_SMTP_PASSWORD:-}
    networks:
      - default
      - llm-net
    volumes:
      - ./data:/app/data
      - ./downloads:/app/downloads
      - ./:/app
    command: celery -A tasks worker --loglevel=info --concurrency=1
    depends_on:
      - redis

  redis:
    image: redis:alpine

networks:
  llm-net:
    external: true
