server {
    listen 80;
    server_name _;
    server_tokens off;

    root /usr/share/nginx/html;

    # -------------------------------------------------------------------------
    # サブパス配信（VITE_BASE_PATH=/meetingminutesnotebook/）
    # Vite は dist をサブディレクトリに出さず、URL だけ /meetingminutesnotebook/... にする。
    # そのため受信時にプレフィックスを剥がして /assets や /index.html に解決する。
    # -------------------------------------------------------------------------
    location ^~ /meetingminutesnotebook/api/ {
        proxy_pass http://api:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        client_max_body_size 5g;
    }

    location ^~ /meetingminutesnotebook/ {
        rewrite ^/meetingminutesnotebook/(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;
    }

    # -------------------------------------------------------------------------
    # ルート配信（VITE_BASE_PATH=/）
    # -------------------------------------------------------------------------
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        client_max_body_size 5g;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
